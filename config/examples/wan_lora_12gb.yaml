# Wan 2.1 LoRA training - 12GB VRAM (block swap enabled)
# Usage: python run.py config/examples/wan_lora_12gb.yaml

model:
  architecture: wan
  base_model_path: "/models/wan2.1-t2v-14B-bf16.safetensors"
  vae_path: "/models/wan_vae.safetensors"
  dtype: bf16
  gradient_checkpointing: true
  block_swap_count: 20
  model_kwargs:
    task: "t2v-14B"
    t5_path: "/models/t5-v1_1-xxl"

training:
  method: lora
  epochs: 1
  max_steps: 1600
  batch_size: 1
  gradient_accumulation_steps: 1
  mixed_precision: bf16
  seed: 42
  max_grad_norm: 1.0
  timestep_sampling: sigmoid
  discrete_flow_shift: 14.5

optimizer:
  optimizer_type: adamw8bit
  learning_rate: 1e-4
  scheduler_type: cosine
  warmup_steps: 100

network:
  network_type: lora
  rank: 16
  alpha: 8.0

data:
  dataset_config_path: "dataset_config.toml"
  cache_latents: true
  cache_text_encoder_outputs: true
  resolution: 512

saving:
  output_dir: "./output/wan_lora_12gb"
  output_name: "wan_lora_v1"
  save_every_n_steps: 400
  max_keep_ckpts: 2

sampling:
  enabled: false
