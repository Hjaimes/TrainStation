# HunyuanVideo - LoRA (12GB VRAM)
# FP8 quantization + block swap to fit in 12GB
model:
  architecture: hunyuan_video
  dtype: bf16
  quantization: fp8
  gradient_checkpointing: true
  block_swap_count: 10
training:
  method: lora
  batch_size: 1
  gradient_accumulation_steps: 2
  mixed_precision: bf16
  timestep_sampling: sigmoid
  sigmoid_scale: 1.0
  guidance_scale: 1.0
optimizer:
  optimizer_type: adamw8bit
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler_type: cosine
  warmup_steps: 50
network:
  network_type: lora
  rank: 32
  alpha: 32
saving:
  save_every_n_epochs: 1
sampling:
  guidance_scale: 5.0
  num_inference_steps: 30
  width: 832
  height: 480
  num_frames: 40
