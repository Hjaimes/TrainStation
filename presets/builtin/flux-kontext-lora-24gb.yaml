# Flux Kontext - LoRA (24GB VRAM)
# Lower resolution than standard Flux (Kontext runs at 2x latent size)
model:
  architecture: flux_kontext
  dtype: bf16
  quantization: fp8
  gradient_checkpointing: true
  model_kwargs:
    task: dev
training:
  method: lora
  batch_size: 1
  gradient_accumulation_steps: 1
  mixed_precision: bf16
optimizer:
  optimizer_type: adamw8bit
  learning_rate: 1.0e-4
  scheduler_type: cosine
  warmup_steps: 100
network:
  network_type: lora
  rank: 16
  alpha: 16
saving:
  save_every_n_epochs: 1
sampling:
  guidance_scale: 4.0
  num_inference_steps: 20
  width: 768
  height: 768
